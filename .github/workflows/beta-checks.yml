name: Floppy Beta Checks

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:
    inputs:
      run_100k_release_gate:
        description: "Run the 100k release load gate"
        required: false
        default: "false"

jobs:
  repository-quality:
    name: Repository Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
      - name: Validate shell scripts
        run: |
          find FloppyMac/Scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n
          find FloppyMac/Scripts -name '*.sh' -print0 | xargs -0 shellcheck -x
      - name: Desktop Mode hook audit
        run: node floppy/tests/desktop-mode/audit-hooks.mjs --format=json

  wordpress-plugin:
    name: WordPress Plugin
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      WP_CORE_DIR: /tmp/wordpress
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mysqli, pdo_sqlite, sqlite3, zip
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Validate Composer metadata
        run: composer validate --strict
      - name: Composer security audit
        run: composer audit:composer
      - name: Composer safe dependency freshness
        run: composer deps:outdated-safe
      - name: PHP lint
        run: composer lint:all
      - name: Load query budget smoke
        run: |
          mkdir -p dist/evidence
          php floppy/tests/load/run-query-budget.php --scenario=10k --format=json | tee dist/evidence/load-10k.json
      - name: Build release evidence sidecar
        run: |
          node floppy/tests/desktop-mode/audit-hooks.mjs --format=json | tee dist/evidence/desktop-mode-hook-audit.json
          node floppy/tests/release/build-evidence-sidecar.mjs \
            --load-report=dist/evidence/load-10k.json \
            --hook-audit=dist/evidence/desktop-mode-hook-audit.json \
            --output=dist/floppy-release-evidence.json
      - name: Upload release evidence sidecar
        uses: actions/upload-artifact@v7
        with:
          name: floppy-release-evidence
          path: |
            dist/floppy-release-evidence.json
            dist/evidence/*.json
          if-no-files-found: error
      - name: Install WordPress test suite
        run: |
          curl -fsSL https://raw.githubusercontent.com/wp-cli/scaffold-command/main/templates/install-wp-tests.sh \
            | bash -s wordpress_test root '' 127.0.0.1:3306 latest true
      - name: WordPress PHPUnit
        run: composer test
      - name: Build plugin ZIP
        run: FloppyMac/Scripts/package-wordpress-plugin.sh
      - name: Validate plugin ZIP shape
        run: |
          unzip -l dist/floppy.zip | grep 'floppy/floppy.php'
          ! unzip -l dist/floppy.zip | grep -E 'floppy/(vendor|tests|composer\.json|composer\.lock|phpunit\.xml|phpcs\.xml|\.github/|\.distignore)'
      - name: Prepare Plugin Check build
        run: |
          rm -rf dist/plugin-check
          mkdir -p dist/plugin-check
          unzip -q dist/floppy.zip -d dist/plugin-check
      - name: WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './dist/plugin-check/floppy'
          slug: floppy
          # Floppy owns indexed custom tables and private blob streaming; those are
          # intentionally not ordinary postmeta/WP_Filesystem paths.
          ignore-codes: |
            WordPress.DB.PreparedSQL.NotPrepared
            PluginCheck.Security.DirectDB.UnescapedDBParameter
            WordPress.WP.AlternativeFunctions.file_system_operations_touch
            WordPress.WP.AlternativeFunctions.file_system_operations_chmod
            WordPress.WP.AlternativeFunctions.file_system_operations_fopen
            WordPress.WP.AlternativeFunctions.file_system_operations_fclose
            WordPress.WP.AlternativeFunctions.file_system_operations_fwrite
            WordPress.WP.AlternativeFunctions.file_system_operations_fread
            WordPress.WP.AlternativeFunctions.file_system_operations_readfile
            WordPress.WP.AlternativeFunctions.unlink_unlink
            WordPress.WP.AlternativeFunctions.rename_rename
            Generic.PHP.ForbiddenFunctions.Found

  mac:
    name: macOS App
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version
      - name: Resolve Swift package
        run: swift package --package-path FloppyMac resolve
      - name: Swift build
        run: swift build --package-path FloppyMac -Xswiftc -warnings-as-errors
      - name: Swift tests
        run: swift test --package-path FloppyMac -Xswiftc -warnings-as-errors
      - name: Xcode doctor
        run: FloppyMac/Scripts/xcode-doctor.sh

  release-scale:
    name: 100k Release Load Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_100k_release_gate == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, sqlite3
      - name: Run 100k load budget
        run: |
          mkdir -p dist/evidence
          php floppy/tests/load/run-query-budget.php --scenario=100k --format=json | tee dist/evidence/load-100k.json
      - name: Upload 100k release evidence
        uses: actions/upload-artifact@v7
        with:
          name: floppy-load-100k-evidence
          path: dist/evidence/load-100k.json
          if-no-files-found: error
