name: FloppyMac

options:
  bundleIdPrefix: com.floppy
  deploymentTarget:
    macOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: "YES"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    OTHER_LDFLAGS:
      - "-lsqlite3"

targets:
  FloppyCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/FloppyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.floppy.mac.core
        GENERATE_INFOPLIST_FILE: "YES"
        SKIP_INSTALL: "YES"

  FloppyMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/FloppyMac
    resources:
      - path: Packaging/FloppyIcon.icns
      - path: Packaging/FloppyMenuBarTemplate.pdf
    dependencies:
      - target: FloppyCore
      - target: FloppyFileProviderExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.floppy.mac
        INFOPLIST_FILE: Packaging/Info.plist
        CODE_SIGN_ENTITLEMENTS: Packaging/FloppyMac.entitlements

  FloppyFileProviderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/FloppyFileProvider
    dependencies:
      - target: FloppyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.floppy.mac.FileProvider
        INFOPLIST_FILE: Extension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extension/FloppyFileProvider.entitlements
        SKIP_INSTALL: "YES"
